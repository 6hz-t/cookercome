# 应用名称
spring:
  application:
    name: cookercome-backend
  profiles:
    include: sensitive
  main:
    allow-circular-references: true

  # MongoDB 配置（当前未启用自动索引）
  data:
    mongodb:
      auto-index-creation: false

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://124.221.15.13:3306/cookercome?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&connectTimeout=30000&socketTimeout=60000
    username: cookercome
    password: 998877
    hikari:
      max-lifetime: 540000
      idle-timeout: 300000
      connection-timeout: 30000
      validation-timeout: 5000
      maximum-pool-size: 20
      minimum-idle: 5
      keepalive-time: 300000
      connection-test-query: SELECT 1

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# 服务端口
server:
  port: 8080

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: cookerc0me2026SecureSecretKeyForJWTToken!@#$%^&*()
  expiration: 7200000
  refresh-expiration: 7776000000

# 日志配置
logging:
  level:
    com.hs.backend: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

# springdoc-openapi 项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.hs.backend.controller

knife4j:
  enable: true
  setting:
    language: zh_cn
