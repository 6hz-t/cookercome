# 应用名称
spring:
  application:
    name: cookercome-backend
  profiles:
    # 激活敏感配置文件（包含 OSS 等敏感信息）
    include: sensitive
  main:
    allow-circular-references: true
  
  # MongoDB 配置（暂时禁用自动连接）
  data:
    mongodb:
      auto-index-creation: false
    redis:
      host: 124.221.15.13
      port: 6379
      password: 998877
      timeout: 5000ms
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms
          shutdown-timeout: 100ms
  
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://124.221.15.13:3306/cookercome?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&connectTimeout=30000&socketTimeout=60000
    username: cookercome
    password: 998877
    # HikariCP 连接池配置（解决连接失效问题）
    hikari:
      max-lifetime: 540000  # 连接最大生命周期 9 分钟（比 MySQL wait_timeout 短）
      idle-timeout: 300000  # 空闲连接超时时间 5 分钟
      connection-timeout: 30000  # 连接超时时间 30 秒
      validation-timeout: 5000  # 验证连接超时时间 5 秒
      maximum-pool-size: 20  # 最大连接数
      minimum-idle: 5  # 最小空闲连接数
      keepalive-time: 300000  # 心跳检测间隔 5 分钟
      connection-test-query: SELECT 1  # 连接测试查询

  # Redis 配置
  redis:
    cache:
      # 用户信息缓存过期时间（分钟）
      user-info-ttl: 30
      # 用户地址列表缓存过期时间（分钟）
      user-address-ttl: 30


  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# 服务端口
server:
  port: 8080

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: cookerc0me2026SecureSecretKeyForJWTToken!@#$%^&*()
  expiration: 7200000  # Access Token: 2 小时 (7200000ms)
  refresh-expiration: 7776000000  # Refresh Token: 90 天 (3 个月) = 90 * 24 * 60 * 60 * 1000

# 阿里云 OSS 配置（已移至 application-sensitive.yml）

# 日志配置
logging:
  level:
    com.hs.backend: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.hs.backend.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
