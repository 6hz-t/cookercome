# 应用名称
spring:
  application:
    name: cookercome-backend
  main:
    allow-circular-references: true
  
  # MongoDB 配置（暂时禁用自动连接）
  data:
    mongodb:
      auto-index-creation: false
  
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://124.221.15.13:3306/cookercome?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&connectTimeout=30000&socketTimeout=60000
    username: cookercome
    password: 998877

  #redis配置
  redics:
      host: 124.221.15.13
      port: 6379
      password: 998877
      timeout: 3000
      database: 0
      pool:
          max-active: 10
          max-idle: 10
          max-wait: -1
          min-idle: 0

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# 服务端口
server:
  port: 8080

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 配置
jwt:
  secret: cookerc0me2026SecureSecretKeyForJWTToken!@#$%^&*()
  expiration: 7200000  # Access Token: 2 小时 (7200000ms)
  refresh-expiration: 7776000000  # Refresh Token: 90 天 (3 个月) = 90 * 24 * 60 * 60 * 1000

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: LTAI5tCvmabLdf2xQcN363tz
    access-key-secret: o2Q5xjQ7hcizJv5w2OMLlrohP4LdWZ
    bucket-name: lihuahua-cookhome
    # 自定义域名（可选，用于 CDN 加速）
    custom-domain: ""

# 日志配置
logging:
  level:
    com.hs.backend: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n'
